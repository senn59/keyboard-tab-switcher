<style>
    @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap");

    :host {
        --max-items-in-view: 6;
        --item-height: 48px;
        --item-gap: 2px;
    }

    *,
    *::before,
    *::after {
        margin: 0;
        padding: 0;
        border: 0;
        box-sizing: border-box;
        font-family: "JetBrains Mono", monospace;
        font-optical-sizing: auto;
        font-weight: 400;
        font-style: normal;
        color: #e5e5e5;
    }

    /* MAIN CONTAINTERS */
    #tab-switcher-cnt {
        position: fixed;
        z-index: 2147483647;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        width: 600px;
        background-color: #171717;
        outline: 1px solid #404040;
        padding: 14px;
        gap: 14px;
        border-radius: 19px;
    }
    #tabs-cnt {
        height: calc(var(--max-items-in-view) * calc(var(--item-height) + var(--item-gap)) - var(--item-gap));
        display: flex;
        flex-direction: column;
        gap: var(--item-gap);
    }
    #search-bar-cnt {
        display: flex;
        align-items: center;
        padding-bottom: 0;
        font-size: 16px;
        padding: 4px;
        padding-bottom: 0;
        gap: 10px;
    }

    /* TAB / LIST ITEM */
    ul {
        padding: 0;
        text-decoration: none;
        list-style: none;
    }
    .tab {
        height: var(--item-height);
        line-height: var(--item-height);
        font-size: 14px;
        width: 100%;
        padding: 0 8px;
        gap: 10px;
        display: flex;
        align-items: center;
        overflow: hidden;
        text-wrap: nowrap;
        text-overflow: ellipsis;
        border-radius: 5px;
    }
    .tab img {
        height: 20px;
    }
    .tab mark {
        background-color: inherit;
        font-weight: bold;
        text-decoration: underline;
    }
    .tab .tab-domain {
        font-size: 12px;
        color: #a1a1a1;
        font-style: italic;
    }
    .tab .tab-title {
        text-overflow: ellipsis;
        overflow: hidden;
        max-width: fit-content;
    }

    ul .active {
        /* background-color: #404040; */
        outline: 1px solid #404040;
    }

    /* SELECTED TAB */
    .tab[aria-selected="true"] {
        background-color: #262626;
        outline: 1px solid #404040;
    }

    /* SEARCH BOX */
    input {
        font-size: 16px;
    }
    input {
        padding: 0;
        background-color: transparent;
        width: 100%;
        color: white;
    }
    input:focus {
        outline: none;
    }

    /* SEPARATOR */
    .separator {
        width: 100%;
        height: 1px;
        background-color: #404040;
    }
</style>
<div id="tab-switcher-cnt">
    <div id="search-bar-cnt">
        <span>tab:</span>
        <input type="text" placeholder="..." id="search-bar" />
    </div>
    <div class="separator"></div>
    <ul id="tabs-cnt"></ul>
</div>
